<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-gradient-to-br from-brand to-blue-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — MóveisERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#1e3a5f' } } } }
  </script>
</head>
<body class="h-full flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-500 rounded-2xl shadow-lg mb-4">
        <span class="text-3xl font-bold text-white">M</span>
      </div>
      <h1 class="text-3xl font-bold text-white">MóveisERP</h1>
      <p class="text-blue-200 text-sm mt-1">Sistema de Gestão para Fábrica de Móveis</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Acesse sua conta</h2>

      {% if form.errors %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        Usuário ou senha incorretos. Tente novamente.
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
          <input type="text" name="username" autofocus
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition"
            placeholder="Seu usuário">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input type="password" name="password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition"
            placeholder="••••••••">
        </div>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition text-sm">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-blue-300 text-xs mt-6">
      MóveisERP v1.0 — Gestão Integrada para Marcenaria
    </p>
  </div>

</body>
</html>

{% for req in requisicoes %}
<tr class="hover:bg-gray-50">
  <td class="px-4 py-3 text-sm font-medium text-brand">{{ req.numero }}</td>
  <td class="px-4 py-3 text-sm text-gray-800">{{ req.item.descricao|default:"—"|truncatechars:40 }}</td>
  <td class="px-4 py-3 text-sm text-gray-700">{{ req.quantidade }}</td>
  <td class="px-4 py-3">
    <span class="px-2 py-0.5 rounded-full text-xs font-medium
      {% if req.status == 'atendida' %}bg-green-100 text-green-800
      {% elif req.status == 'cancelada' %}bg-red-100 text-red-800
      {% else %}bg-yellow-100 text-yellow-800{% endif %}">
      {{ req.get_status_display }}
    </span>
  </td>
  <td class="px-4 py-3">
    <span class="px-2 py-0.5 rounded text-xs {% if req.prioridade == 'urgente' %}text-red-600 bg-red-50{% elif req.prioridade == 'alta' %}text-orange-600 bg-orange-50{% else %}text-gray-600{% endif %}">{{ req.get_prioridade_display }}</span>
  </td>
  <td class="px-4 py-3 text-sm text-gray-500">{{ req.responsavel.get_full_name|default:"—" }}</td>
</tr>
{% empty %}
<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 text-sm">Nenhuma requisição encontrada.</td></tr>
{% endfor %}

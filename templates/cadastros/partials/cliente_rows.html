{% for cliente in clientes %}
<tr class="hover:bg-gray-50 cursor-pointer" onclick="window.location='{% url 'cadastros:cliente_detail' cliente.pk %}'">
  <td class="px-4 py-3 text-sm font-medium text-gray-800">{{ cliente.nome }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ cliente.cnpj_cpf|default:"—" }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ cliente.email|default:"—" }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ cliente.telefone|default:"—" }}</td>
  <td class="px-4 py-3 text-sm text-gray-500">{{ cliente.cidade|default:"—" }}</td>
  <td class="px-4 py-3">{% if cliente.ativo %}<span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>{% else %}<span class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span>{% endif %}</td>
</tr>
{% empty %}
<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 text-sm">Nenhum cliente encontrado.</td></tr>
{% endfor %}

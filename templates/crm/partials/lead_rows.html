{% for lead in leads %}
<tr class="hover:bg-gray-50 cursor-pointer" onclick="window.location='{% url 'crm:lead_detail' lead.pk %}'">
  <td class="px-4 py-3 text-sm font-medium text-gray-800">{{ lead.nome }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ lead.empresa|default:"—" }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ lead.email|default:"—" }}</td>
  <td class="px-4 py-3 text-sm text-gray-600">{{ lead.telefone|default:"—" }}</td>
  <td class="px-4 py-3">
    <span class="px-2 py-0.5 rounded-full text-xs font-medium
      {% if lead.status == 'qualificado' %}bg-green-100 text-green-800
      {% elif lead.status == 'perdido' %}bg-red-100 text-red-800
      {% elif lead.status == 'em_contato' %}bg-blue-100 text-blue-800
      {% else %}bg-gray-100 text-gray-600{% endif %}">
      {{ lead.get_status_display }}
    </span>
  </td>
  <td class="px-4 py-3 text-sm text-gray-500">{{ lead.responsavel.get_full_name|default:"—" }}</td>
</tr>
{% empty %}
<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 text-sm">Nenhum lead encontrado.</td></tr>
{% endfor %}
